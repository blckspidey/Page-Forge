name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean Docker Username
        id: clean
        run: |
          CLEANED_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr -d '\r\n' | xargs)
          echo "username=$CLEANED_USER" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.clean.outputs.username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.clean.outputs.username }}/page-forge-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLEAN_DOCKER_USERNAME: ${{ steps.clean.outputs.username }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: CLEAN_DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            # Login to Docker
            echo "$DOCKER_PASSWORD" | docker login -u "$CLEAN_DOCKER_USERNAME" --password-stdin
            
            # Pull the latest backend image
            docker pull $CLEAN_DOCKER_USERNAME/page-forge-backend:latest
            
            # Stop and remove the existing container if it exists
            docker stop page-forge-backend || true
            docker rm page-forge-backend || true
            
            # Run the new container
            docker run -d \
              --name page-forge-backend \
              -p 5000:5000 \
              --restart always \
              -v /var/www/uploads:/usr/src/app/uploads \
              --env-file /home/${{ secrets.EC2_USERNAME }}/.env \
              $CLEAN_DOCKER_USERNAME/page-forge-backend:latest
              
            # Clean up old unused Docker images
            docker image prune -f
