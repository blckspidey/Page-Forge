<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- PDF page shape -->
  <rect x="7" y="4" width="14" height="18" rx="1.5" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Folded corner -->
  <path d="M18 4 L21 7 L18 7 Z" fill="#8b5cf6" opacity="0.6"/>
  <!-- Lines on page -->
  <line x1="10" y1="11" x2="18" y2="11" stroke="#8b5cf6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="14" x2="18" y2="14" stroke="#6366f1" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="17" x2="15" y2="17" stroke="#6366f1" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Forge hammer symbol -->
  <rect x="17" y="19" width="9" height="6" rx="1" fill="#8b5cf6"/>
  <rect x="19" y="22" width="5" height="6" rx="0.5" fill="#6d28d9"/>
</svg>